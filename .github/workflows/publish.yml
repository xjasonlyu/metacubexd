name: publish

on:
  workflow_dispatch:
  schedule:
    - cron: '43 21 * * *'
  push:
    branches:
      - home

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.event_name != 'push'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Rebase branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/MetaCubeX/metacubexd.git
          git fetch upstream

          git rebase upstream/main

          git push --force-with-lease origin home

  gh-pages:
    runs-on: ubuntu-latest
    needs: sync
    if: always() && (needs.sync.result == 'success' || needs.sync.result == 'skipped')

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: latest

      - name: install dependencies
        run: pnpm install

      - name: build
        run: NUXT_APP_BASE_URL='./' pnpm generate

      - name: publish gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.output/public
          force_orphan: true
          cname: d.metacubex.one
